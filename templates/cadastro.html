{% extends "base.html" %}

{% block title %}Cadastro | Minha Estante{% endblock %}

{% block content %}
<section class="max-w-md mx-auto bg-card rounded-2xl p-6 border border-purple-900/50 fade-in">
    <div class="text-center mb-6">
        <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center mx-auto mb-4">
            <i data-lucide="user-plus" class="w-6 h-6 text-white"></i>
        </div>

        <h1 class="text-2xl font-bold font-serif">Criar conta</h1>
        <p class="text-muted text-sm mt-1">Cadastre um novo usuário.</p>
    </div>

    <form method="post" class="space-y-4">
        <div>
            <label class="block text-sm text-muted mb-1">Nome</label>
            <input type="text" name="nome" required class="input-dark">
        </div>

        <div>
            <label class="block text-sm text-muted mb-1">E-mail</label>
            <input type="email" name="email" required class="input-dark">
        </div>

        <div>
            <label class="block text-sm text-muted mb-1">Senha</label>
            <input type="password" name="senha" required class="input-dark">
        </div>

        <button type="submit" class="w-full bg-accent hover:bg-purple-600 py-2.5 rounded-lg font-medium text-sm transition-colors">
            Cadastrar
        </button>
    </form>

    <p class="text-muted text-sm text-center mt-5">
        Já tem conta?
        <a href="{{ url_for('login') }}" class="text-accent hover:text-purple-300">Faça login</a>
    </p>
</section>
{% endblock %}

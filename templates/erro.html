{% extends "base.html" %}

{% block title %}Erro | Minha Estante{% endblock %}

{% block content %}
<section class="text-center py-20 fade-in">
    <i data-lucide="alert-triangle" class="w-16 h-16 text-red-400 mx-auto mb-4"></i>

    <h1 class="text-3xl md:text-5xl font-bold font-serif mb-4">
        Algo deu errado
    </h1>

    <p class="text-muted max-w-lg mx-auto mb-6">
        {{ mensagem }}
    </p>

    <a href="{{ url_for('dashboard') if usuario_logado else url_for('index') }}" class="bg-accent hover:bg-purple-600 px-5 py-3 rounded-lg text-sm font-medium inline-flex items-center gap-2 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Voltar
    </a>
</section>
{% endblock %}
